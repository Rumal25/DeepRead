<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}DeepRead{% endblock %}</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body { background-color: #f0f2f5; }

        .navbar { background-color: #1a237e !important; }
        .navbar-brand { font-size: 1.4rem; font-weight: 700; letter-spacing: 1px; }
        .nav-link-custom {
            color: rgba(255,255,255,0.85) !important;
            text-decoration: none;
            padding: 0.5rem 1rem;
            border-radius: 6px;
            transition: background 0.2s;
        }
        .nav-link-custom:hover { background-color: rgba(255,255,255,0.15); }

        .card { border: none; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
        .card-header { border-radius: 12px 12px 0 0 !important; font-weight: 600; }

        .btn-primary { background-color: #1a237e; border-color: #1a237e; }
        .btn-primary:hover { background-color: #283593; border-color: #283593; }

        .badge-toread { background-color: #78909c; }
        .badge-reading { background-color: #f57c00; }
        .badge-read { background-color: #1565c0; }
        .badge-implemented { background-color: #2e7d32; }

        .table th { font-weight: 600; }
        .table-hover tbody tr:hover { background-color: #e8eaf6; }

        .footer {
            background-color: #1a237e;
            color: rgba(255,255,255,0.7);
            text-align: center;
            padding: 1rem;
            margin-top: 3rem;
            font-size: 0.85rem;
        }

        .page-header {
            background: linear-gradient(135deg, #1a237e, #3949ab);
            color: white;
            padding: 1.5rem 2rem;
            border-radius: 12px;
            margin-bottom: 1.5rem;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-dark navbar-expand-lg px-4 py-2">
        <a class="navbar-brand" href="{% url 'home' %}">📚 DeepRead</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navMenu">
            <div class="navbar-nav ms-auto gap-1">
                <a class="nav-link-custom" href="{% url 'home' %}">🏠 Home</a>
                <a class="nav-link-custom" href="{% url 'papers:paper_list' %}">📄 Papers</a>
                <a class="nav-link-custom" href="{% url 'papers:author_list' %}">👤 Authors</a>
                <a class="nav-link-custom" href="{% url 'papers:topic_list' %}">🏷️ Topics</a>
            </div>
        </div>
    </nav>

    <div class="container mt-4 mb-5">
        {% block content %}{% endblock %}
    </div>

    <div class="footer">
        DeepRead — Research Paper Manager for Deep Learning Researchers &nbsp;|&nbsp; 25R8106 BOIDYA Rumal
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
