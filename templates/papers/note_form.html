{% extends "base.html" %}
{% block title %}Add Note - DeepRead{% endblock %}
{% block content %}

<div class="page-header">
    <h2 class="mb-1">📝 Add Reading Note</h2>
    <p class="mb-0 opacity-75">Paper: {{ paper.title }}</p>
</div>

<div class="card">
    <div class="card-body">
        <form method="post">
            {% csrf_token %}
            <div class="mb-3">
                <label class="form-label fw-semibold">Page Number</label>
                {{ form.page_number }}
            </div>
            <div class="mb-3">
                <label class="form-label fw-semibold">Note Content</label>
                {{ form.content }}
            </div>
            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-primary">Save Note</button>
                <a href="{% url 'papers:paper_detail' pk=paper.pk %}"
                   class="btn btn-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>

{% endblock %}
