{% extends "base.html" %}
{% block title %}{% if topic %}Edit{% else %}Add{% endif %} Topic - DeepRead{% endblock %}
{% block content %}
<h2>{% if topic %}Edit Topic{% else %}Add Topic{% endif %}</h2>
<form method="post">
    {% csrf_token %}
    <div class="mb-3"><label class="form-label">Name</label>{{ form.name }}</div>
    <div class="mb-3"><label class="form-label">Description</label>{{ form.description }}</div>
    <button type="submit" class="btn btn-primary">Save</button>
    <a href="{% url 'papers:topic_list' %}" class="btn btn-secondary">Cancel</a>
</form>
{% endblock %}
